name: kulupi
description: "Kulüpi - Üniversite Kulüpleri ve Etkinlikleri"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  curved_navigation_bar: ^1.0.6
  flutter_colorpicker: ^1.1.0
  supabase_flutter: ^2.8.3
  intl: ^0.20.2
  table_calendar: ^3.2.0
  file_picker: ^10.3.10
  image_picker: ^1.2.1
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  animations: ^2.1.1
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # --- EKLENEN PAKET ---
  flutter_launcher_icons: ^0.13.1
  url_launcher: ^6.3.0

# --- İKON AYARLARI ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  
  # Görseli uygulamanın içinde de kullanacaksan burayı açabilirsin:
  assets:
  - assets/logo.png
  - assets/mockup2.png
  - assets/mockup1.png